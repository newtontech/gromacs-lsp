# GROMACS-LSP diagnostic rule manifest (Diagnostic Engine v1).
#
# OpenQC consumers read this manifest to discover the rule surface that
# gromacs-lsp exports. Each entry carries a stable rule_id, the planned
# severity, the source classification, and a manual reference.
schema: OpenQCDiagnosticsManifest
version: 1
software: gromacs
source_provenance:
  - kind: official_spec
    label: GROMACS MDP options
    url: https://manual.gromacs.org/current/user-guide/mdp-options.html
rules:
  - rule_id: gromacs.mdp.unknown_parameter
    code: GMX002
    severity: error
    category: schema
    file_type: mdp
    source: official
    confidence: 0.9
    blocking: true
    description: >-
      Reports an MDP parameter that is not part of the official GROMACS mdp
      option set. GROMACS silently ignores unknown mdp options, which can mask
      typos (e.g. `nsteps` vs `nstesp`) and hide intended simulation behavior.
    manual_ref: https://manual.gromacs.org/current/user-guide/mdp-options.html
    fix_hint:
      kind: check_mdp_keyword
  - rule_id: gromacs.mdp.invalid_value
    code: GMX004
    severity: error
    category: type/value
    file_type: mdp
    source: official
    confidence: 0.9
    blocking: true
    description: >-
      Reports a value that is not valid for a known MDP parameter. GROMACS
      validates mdp option values at runtime (enum membership, numeric range,
      and integer type) and aborts on an out-of-set value, so an invalid value
      such as `integrator = warp9` or `nsteps = -5` will block the run before it
      starts. Catching it in the editor surfaces the failure early.
    manual_ref: https://manual.gromacs.org/current/user-guide/mdp-options.html
    fix_hint:
      kind: valid_values
  - rule_id: gromacs.topology.missing_include
    code: GMX023
    severity: error
    category: cross-file reference
    file_type: top
    source: official
    confidence: 0.9
    blocking: true
    description: >-
      Reports a GROMACS topology `#include` directive that references a file
      which cannot be resolved relative to the topology's directory (or the
      configured shared force-field paths). grompp resolves `#include`
      statements at preprocessing time and aborts when a referenced file is
      missing, so surfacing the unresolved include in the editor catches the
      failure early.
    manual_ref: https://manual.gromacs.org/current/reference-manual/topologies/file-format.html
    fix_hint:
      kind: check_include_path
